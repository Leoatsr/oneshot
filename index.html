<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="OneShot">
<meta name="theme-color" content="#0a0a0a">
<meta name="format-detection" content="telephone=no">
<title>OneShot · 对准就拍</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@200;300;400;500&family=JetBrains+Mono:wght@300;400;500&family=Noto+Sans+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #0a0a0a;
  --fg: #ffffff;
  --accent: #f5b841;
  --accent-deep: #d99a1f;
  --warn: #ff7043;
  --ok: #6fcf97;
  --dim: rgba(255, 255, 255, 0.35);
  --dim-2: rgba(255, 255, 255, 0.6);
  --line: rgba(255, 255, 255, 0.12);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px);
  --safe-right: env(safe-area-inset-right, 0px);
}

html, body {
  width: 100%;
  height: 100vh;
  height: 100dvh;
  overflow: hidden;
  background: var(--bg);
  color: var(--fg);
  font-family: 'Geist', 'Noto Sans SC', -apple-system, system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
  overscroll-behavior: none;
  touch-action: none;
}

button, input { font-family: inherit; }
input { -webkit-user-select: text; user-select: text; }

/* ====== Start / Key entry ====== */
#start {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 2rem;
  text-align: center;
  overflow-y: auto;
}

.logo-mark {
  width: 64px;
  height: 64px;
  border: 1px solid var(--fg);
  border-radius: 50%;
  margin-bottom: 2rem;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.logo-mark::before {
  content: '';
  width: 12px;
  height: 12px;
  background: var(--accent);
  border-radius: 50%;
}

#start h1 {
  font-family: 'Geist', sans-serif;
  font-weight: 200;
  font-size: 3.4rem;
  letter-spacing: -0.04em;
  margin-bottom: 0.5rem;
  line-height: 1;
}

.tagline {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 300;
  font-size: 0.68rem;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: var(--dim-2);
  margin-bottom: 2.5rem;
}

.key-box {
  width: 100%;
  max-width: 340px;
  margin-bottom: 1rem;
}

.key-box label {
  display: block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.62rem;
  letter-spacing: 0.22em;
  color: var(--dim);
  text-transform: uppercase;
  text-align: left;
  margin-bottom: 0.5rem;
}

.key-box input {
  width: 100%;
  padding: 0.9rem 1rem;
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid var(--line);
  border-radius: 10px;
  color: var(--fg);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85rem;
  letter-spacing: 0.02em;
  outline: none;
  transition: border-color 0.2s;
}
.key-box input:focus {
  border-color: var(--accent);
}
.key-box input::placeholder {
  color: var(--dim);
}

.key-hint {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.72rem;
  font-weight: 300;
  color: var(--dim);
  text-align: left;
  margin-top: 0.5rem;
  line-height: 1.7;
}
.key-hint a {
  color: var(--accent);
  text-decoration: none;
  border-bottom: 1px dashed currentColor;
}

#start-btn {
  background: transparent;
  border: 1px solid var(--fg);
  color: var(--fg);
  padding: 1rem 3rem;
  font-size: 0.95rem;
  font-weight: 400;
  letter-spacing: 0.08em;
  border-radius: 100px;
  cursor: pointer;
  transition: all 0.25s ease;
  font-family: 'Noto Sans SC', sans-serif;
  margin-top: 1.5rem;
}
#start-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}
#start-btn:not(:disabled):active {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--bg);
  transform: scale(0.97);
}

.start-error {
  color: var(--warn);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  margin-top: 1rem;
  min-height: 1em;
}

.hint-foot {
  margin-top: 2rem;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.72rem;
  font-weight: 300;
  color: var(--dim);
  line-height: 1.8;
  max-width: 320px;
}
.hint-foot strong { color: var(--dim-2); font-weight: 400; }

/* ====== Camera ====== */
#camera-view {
  position: fixed;
  inset: 0;
  display: none;
}
#camera-view.active { display: block; }

video {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  background: #000;
}

.vignette {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.35) 100%);
  z-index: 2;
}

/* ====== Silhouette ====== */
#silhouette {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  z-index: 3;
}
#silhouette svg {
  width: 62%;
  max-width: 300px;
  height: auto;
  opacity: 0.42;
  animation: breathe 3.2s ease-in-out infinite;
  transition: opacity 0.5s ease;
  filter: drop-shadow(0 0 12px rgba(0,0,0,0.4));
}
#silhouette.aligned svg {
  opacity: 0.88;
  animation-duration: 4.5s;
}
#silhouette svg .stroke {
  stroke: white;
  fill: none;
  stroke-width: 1.6;
  stroke-dasharray: 6 6;
  stroke-linecap: round;
  transition: stroke 0.6s ease;
}
#silhouette.aligned svg .stroke {
  stroke: var(--accent);
  stroke-dasharray: none;
}
#silhouette svg .dot {
  fill: white;
  opacity: 0.4;
  transition: fill 0.6s ease;
}
#silhouette.aligned svg .dot {
  fill: var(--accent);
  opacity: 0.9;
}
@keyframes breathe {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.025); }
}

/* ====== Scene label ====== */
#scene-label {
  position: absolute;
  top: calc(1.3rem + var(--safe-top));
  left: 50%;
  transform: translateX(-50%);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.62rem;
  font-weight: 400;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--dim-2);
  padding: 0.45rem 0.95rem;
  border: 1px solid var(--line);
  border-radius: 100px;
  background: rgba(0, 0, 0, 0.35);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  opacity: 0;
  transition: opacity 0.6s ease, color 0.3s ease, border-color 0.3s ease;
  z-index: 4;
  white-space: nowrap;
  max-width: calc(100vw - 200px);
  overflow: hidden;
  text-overflow: ellipsis;
}
#scene-label.visible { opacity: 1; }
#scene-label.thinking {
  color: var(--accent);
  border-color: rgba(245, 184, 65, 0.4);
}
#scene-label.error {
  color: var(--warn);
  border-color: rgba(255, 112, 67, 0.4);
}
#scene-label .dot-pulse {
  display: inline-block;
  width: 5px;
  height: 5px;
  background: var(--accent);
  border-radius: 50%;
  margin-right: 0.5rem;
  vertical-align: middle;
  animation: pulse 1.6s ease-in-out infinite;
}
#scene-label.thinking .dot-pulse {
  animation: pulse-fast 0.8s ease-in-out infinite;
}
#scene-label.error .dot-pulse {
  background: var(--warn);
  animation: none;
}
@keyframes pulse {
  0%, 100% { opacity: 0.3; transform: scale(0.9); }
  50% { opacity: 1; transform: scale(1.2); }
}
@keyframes pulse-fast {
  0%, 100% { opacity: 0.4; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.3); }
}

/* ====== HUD ====== */
#hud {
  position: absolute;
  top: calc(1.1rem + var(--safe-top));
  right: calc(1.1rem + var(--safe-right));
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.56rem;
  font-weight: 400;
  letter-spacing: 0.16em;
  background: rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 0.55rem 0.7rem;
  z-index: 5;
  min-width: 135px;
  transition: opacity 0.3s ease;
}
#hud.hidden { opacity: 0.2; }
.hud-row {
  display: flex;
  justify-content: space-between;
  gap: 0.8rem;
  line-height: 1.75;
  text-transform: uppercase;
}
.hud-k { color: var(--dim); }
.hud-v {
  color: var(--dim-2);
  font-variant-numeric: tabular-nums;
  transition: color 0.2s ease;
}
.hud-v.thinking { color: var(--accent); }
.hud-v.warn { color: var(--warn); }
.hud-v.ready { color: var(--ok); }
.hud-v.err { color: var(--warn); }
.hud-sep {
  height: 1px;
  background: var(--line);
  margin: 0.4rem -0.15rem;
}

/* ====== Align hint ====== */
#align-hint {
  position: absolute;
  bottom: calc(180px + var(--safe-bottom));
  left: 50%;
  transform: translateX(-50%);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  font-weight: 400;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--accent);
  text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6);
  opacity: 0;
  transition: opacity 0.5s ease;
  z-index: 4;
  white-space: nowrap;
}
#align-hint.visible { opacity: 1; }

/* ====== Settings (long-press) ====== */
#settings {
  position: absolute;
  top: calc(1.1rem + var(--safe-top));
  left: calc(1.1rem + var(--safe-left));
  width: 44px;
  height: 44px;
  border: none;
  background: rgba(0, 0, 0, 0.3);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0.55;
  transition: opacity 0.3s, transform 0.2s;
  z-index: 5;
  color: var(--fg);
}
#settings:active { opacity: 1; transform: scale(0.9); }
#settings svg { width: 20px; height: 20px; }
#settings.pressing { opacity: 1; background: rgba(245, 184, 65, 0.15); }
#settings.pressing svg { color: var(--accent); }

.press-ring { position: absolute; inset: 0; pointer-events: none; }
.press-ring circle {
  fill: none;
  stroke: var(--accent);
  stroke-width: 2;
  stroke-dasharray: 138;
  stroke-dashoffset: 138;
  transform: rotate(-90deg);
  transform-origin: center;
  transition: stroke-dashoffset 0.5s linear;
}
#settings.pressing .press-ring circle { stroke-dashoffset: 0; }

/* ====== Shutter ====== */
#controls {
  position: absolute;
  bottom: calc(2.2rem + var(--safe-bottom));
  left: 0;
  right: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 5;
}
#shutter {
  width: 82px;
  height: 82px;
  border-radius: 50%;
  border: 3px solid var(--fg);
  background: transparent;
  cursor: pointer;
  position: relative;
  padding: 0;
  transition: transform 0.15s ease;
}
#shutter::before {
  content: '';
  position: absolute;
  inset: 6px;
  background: var(--fg);
  border-radius: 50%;
  transition: all 0.2s cubic-bezier(0.2, 0, 0.2, 1);
}
#shutter:active { transform: scale(0.94); }
#shutter:active::before { inset: 10px; background: var(--accent); }
#shutter.ready::before {
  background: var(--accent);
  box-shadow: 0 0 24px rgba(245, 184, 65, 0.5);
}

/* ====== Flash ====== */
#flash {
  position: fixed;
  inset: 0;
  background: white;
  opacity: 0;
  pointer-events: none;
  z-index: 50;
}
#flash.flashing { animation: flash 0.32s ease-out; }
@keyframes flash {
  0% { opacity: 0; }
  20% { opacity: 0.92; }
  100% { opacity: 0; }
}

/* ====== Preview ====== */
#preview {
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 45;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem;
}
#preview.visible { display: flex; animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

#preview-img {
  max-width: 100%;
  max-height: 72vh;
  object-fit: contain;
  border-radius: 4px;
}
#preview-meta {
  margin-top: 1.5rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  letter-spacing: 0.22em;
  color: var(--accent);
  text-transform: uppercase;
}
#preview-save-hint {
  margin-top: 0.4rem;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.72rem;
  color: var(--dim);
  font-weight: 300;
  text-align: center;
}
#preview-close {
  position: absolute;
  top: calc(1.1rem + var(--safe-top));
  right: calc(1.1rem + var(--safe-right));
  width: 40px;
  height: 40px;
  border: none;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 50%;
  color: var(--fg);
  font-size: 1.4rem;
  cursor: pointer;
  opacity: 0.8;
}

/* ====== Pro panel ====== */
#pro {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(10, 10, 10, 0.96);
  backdrop-filter: blur(30px);
  -webkit-backdrop-filter: blur(30px);
  transform: translateY(100%);
  transition: transform 0.45s cubic-bezier(0.2, 0, 0.2, 1);
  z-index: 60;
  padding: 1.8rem 1.5rem calc(2rem + var(--safe-bottom));
  border-top: 1px solid var(--line);
  border-radius: 20px 20px 0 0;
  max-height: 80vh;
  overflow-y: auto;
}
#pro.open { transform: translateY(0); }

.pro-handle {
  width: 40px;
  height: 4px;
  background: var(--dim);
  border-radius: 2px;
  margin: 0 auto 1.3rem;
}

#pro-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 1.4rem;
}
#pro-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  font-weight: 400;
  letter-spacing: 0.26em;
  text-transform: uppercase;
  color: var(--dim-2);
}
#pro-title .accent { color: var(--accent); }
#pro-close {
  background: none;
  border: none;
  color: var(--fg);
  font-size: 1.6rem;
  cursor: pointer;
  opacity: 0.6;
  line-height: 1;
  padding: 0;
  font-weight: 200;
}

.param-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 0.6rem;
  margin-bottom: 1.3rem;
}
.param {
  text-align: left;
  padding: 0.8rem 0.85rem 0.9rem;
  border: 1px solid var(--line);
  border-radius: 10px;
  background: rgba(255, 255, 255, 0.015);
  transition: border-color 0.3s ease, background 0.3s ease;
}
.param.changed {
  border-color: rgba(245, 184, 65, 0.45);
  background: rgba(245, 184, 65, 0.06);
}
.param-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.58rem;
  font-weight: 400;
  letter-spacing: 0.22em;
  color: var(--dim);
  margin-bottom: 0.3rem;
  text-transform: uppercase;
}
.param-value {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1.0rem;
  font-weight: 400;
  color: var(--fg);
  letter-spacing: -0.01em;
}
.param-value.accent { color: var(--accent); }
.param-value.small { font-size: 0.78rem; }

#pro-reasoning {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.76rem;
  font-weight: 300;
  color: var(--dim-2);
  line-height: 1.75;
  padding: 0.9rem 1rem;
  background: rgba(245, 184, 65, 0.05);
  border: 1px solid rgba(245, 184, 65, 0.15);
  border-radius: 10px;
  margin-bottom: 1rem;
}
#pro-reasoning::before {
  content: 'AI · ';
  color: var(--accent);
  font-family: 'JetBrains Mono', monospace;
  font-weight: 400;
  letter-spacing: 0.15em;
}

.pro-signals {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.6rem;
  margin-bottom: 1rem;
}
.signal-box {
  padding: 0.75rem 0.85rem;
  border: 1px solid var(--line);
  border-radius: 10px;
  background: rgba(255, 255, 255, 0.015);
}
.signal-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.56rem;
  letter-spacing: 0.22em;
  color: var(--dim);
  text-transform: uppercase;
  margin-bottom: 0.4rem;
}
.signal-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.3rem;
}
.signal-tag {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.7rem;
  padding: 0.2rem 0.5rem;
  background: rgba(245, 184, 65, 0.08);
  color: var(--accent);
  border-radius: 4px;
  font-weight: 300;
}

.pro-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 1rem;
  border-top: 1px solid var(--line);
  margin-top: 0.5rem;
}
.pro-footer-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6rem;
  color: var(--dim);
  letter-spacing: 0.15em;
}
#reset-key {
  background: none;
  border: none;
  color: var(--warn);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.62rem;
  letter-spacing: 0.15em;
  cursor: pointer;
  padding: 0.3rem 0.5rem;
  text-transform: uppercase;
  opacity: 0.7;
}

/* ====== Error ====== */
#error {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  text-align: center;
  z-index: 200;
}
#error.visible { display: flex; }
#error h2 {
  font-family: 'Geist', sans-serif;
  font-weight: 300;
  font-size: 1.4rem;
  margin-bottom: 1rem;
}
#error p {
  font-family: 'Noto Sans SC', sans-serif;
  color: var(--dim-2);
  font-size: 0.88rem;
  font-weight: 300;
  line-height: 1.8;
  max-width: 340px;
}
#error button {
  margin-top: 2rem;
  background: transparent;
  border: 1px solid var(--fg);
  color: var(--fg);
  padding: 0.8rem 2rem;
  border-radius: 100px;
  cursor: pointer;
  font-size: 0.85rem;
}
</style>
</head>
<body>

<!-- Start / Key entry -->
<div id="start">
  <div class="logo-mark"></div>
  <h1>OneShot</h1>
  <div class="tagline">对 · 准 · 就 · 拍</div>

  <div class="key-box">
    <label for="api-key">Gemini API Key</label>
    <input type="password" id="api-key" placeholder="AIza..." autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
    <div class="key-hint">
      没有 key？去 <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">aistudio.google.com/apikey</a> 免费申请<br>
      key 只保存在你的手机本地，不会上传到任何服务器
    </div>
  </div>

  <button id="start-btn" disabled>开始</button>
  <div class="start-error" id="start-error"></div>

  <div class="hint-foot">
    把人物放进<strong>轮廓</strong>里 · AI 实时分析画面 ·<br>
    自动给出姿势建议和 M 档参数 · 你只管按快门
  </div>
</div>

<!-- Camera -->
<div id="camera-view">
  <video id="video" autoplay playsinline muted webkit-playsinline></video>
  <div class="vignette"></div>

  <div id="silhouette">
    <svg id="svg-pose" viewBox="0 0 200 400" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <div id="scene-label">
    <span class="dot-pulse"></span><span id="scene-text">WAITING</span>
  </div>

  <div id="hud">

<script>
/* ============================================================

      <path class="stroke" d="M 90 60 Q 82 80 85 110 Q 88 135 100 150"/>

      <line class="stroke" x1="160" y1="120" x2="160" y2="360" stroke-opacity="0.3" stroke-dasharray="3 8"/>

  },
  dynamic: {
    label: '动感瞬间',
    svg: `
      <ellipse class="stroke" cx="115" cy="70" rx="26" ry="32" transform="rotate(12 115 70)"/>
      <path class="stroke" d="M 98 105 Q 95 125 78 155 L 55 225"/>
      <path class="stroke" d="M 130 105 Q 135 122 155 140 L 178 155"/>
      <path class="stroke" d="M 55 225 L 48 310 Q 55 335 42 370"/>

    `
  }
};

const POSE_KEYS = Object.keys(POSES);

/* ====== State ====== */
let apiKey = localStorage.getItem(STORAGE_KEY) || '';
let currentPoseKey = null;
let stream = null;
let lastMotionTime = Date.now();
let stableCheckInterval = null;
let fastLoopHandle = null;
let isAligned = false;
let motionAvailable = false;
let isThinking = false;
let vlmCallCount = 0;
let lastVlmTime = 0;
let lastBrightness = null;
let lastFastMs = 0;
let lastVlmMs = 0;
let lastVlmError = null;
let fastIntervalMs = 200;
let currentFps = 0;
let thermalWarn = false;
let lastDecision = null;

/* ====== Tunables ====== */
const VLM_MIN_INTERVAL_MS = 6000;
const VLM_BRIGHTNESS_DELTA = 20;
const ALIGNED_HOLD_MS = 1100;
const THERMAL_FPS_THRESHOLD = 24;
const VLM_INPUT_SIZE = 512;  // resize to 512 before sending (small = fast + cheap)
const VLM_TIMEOUT_MS = 12000;

/* Canvases */
const fastCanvas = document.createElement('canvas');
fastCanvas.width = 16; fastCanvas.height = 16;
const fastCtx = fastCanvas.getContext('2d', { willReadFrequently: true });

const vlmCanvas = document.createElement('canvas');
vlmCanvas.width = VLM_INPUT_SIZE; vlmCanvas.height = VLM_INPUT_SIZE;
const vlmCtx = vlmCanvas.getContext('2d');

const captureCanvas = document.createElement('canvas');
const captureCtx = captureCanvas.getContext('2d');

/* DOM refs */
const video = $('video');
const svgPose = $('svg-pose');
const silhouette = $('silhouette');
const sceneLabel = $('scene-label');
const sceneText = $('scene-text');
const alignHint = $('align-hint');
const shutterBtn = $('shutter');
const settingsBtn = $('settings');
const flashEl = $('flash');
const previewEl = $('preview');
const previewImg = $('preview-img');
const previewCloseBtn = $('preview-close');
const proEl = $('pro');
const proCloseBtn = $('pro-close');
const errorEl = $('error');
const errorMsg = $('error-msg');
const startEl = $('start');
const startBtn = $('start-btn');
const startError = $('start-error');
const cameraView = $('camera-view');
const hudEl = $('hud');
const keyInput = $('api-key');

/* ====== Key input validation ====== */
function validateKeyFormat(k) {
  return typeof k === 'string' && /^AIza[0-9A-Za-z_-]{20,}$/.test(k.trim());
}

if (apiKey) {
  keyInput.value = apiKey;
  startBtn.disabled = !validateKeyFormat(apiKey);
}

keyInput.addEventListener('input', () => {
  const v = keyInput.value.trim();
  startBtn.disabled = !validateKeyFormat(v);
  startError.textContent = '';
});

/* ====== Pose setting ====== */
function setPose(key, decision) {
  const pose = POSES[key];
  if (!pose) return;
  const changed = currentPoseKey !== key;
  currentPoseKey = key;

  if (changed) {
    svgPose.style.transition = 'opacity 0.4s ease';
    svgPose.style.opacity = '0';
    setTimeout(() => {
      svgPose.innerHTML = pose.svg;
      svgPose.style.opacity = '';
    }, 380);

    sceneLabel.style.borderColor = 'rgba(245, 184, 65, 0.5)';
    setTimeout(() => sceneLabel.style.borderColor = '', 600);
  }

  if (decision) {
    updateParam('iso', String(decision.iso), 'param-iso');
    updateParam('shutter', decision.shutter, 'param-shutter');
    updateParam('ev', formatEV(decision.ev), 'param-ev');
    updateParam('wb', decision.wb, 'param-wb');
    updateParam('scene', decision.scene || pose.label, 'param-scene');
    $('pro-reasoning').textContent = decision.reasoning || '';

    // Environment/Subject signals
    renderTags('env-tags', decision.env_signals);
    renderTags('subj-tags', decision.subject_signals);

    // Footer meta
    $('pro-meta').textContent =
      `#${vlmCallCount} · ${Math.round(lastVlmMs)}ms · ${decision.scene || '—'}`;

    // Update scene label text to show scene name from VLM
    if (decision.scene) {
      sceneText.textContent = decision.scene.toUpperCase();
    }
  }
}

function renderTags(containerId, arr) {
  const el = $(containerId);
  if (!el) return;
  el.innerHTML = '';
  if (!arr || !arr.length) {
    el.innerHTML = '<span class="signal-tag">—</span>';
    return;
  }
  arr.slice(0, 4).forEach(t => {
    const span = document.createElement('span');
    span.className = 'signal-tag';
    span.textContent = t;
    el.appendChild(span);
  });
}

function formatEV(ev) {
  if (typeof ev !== 'number') return String(ev);
  if (ev === 0) return '0.0';
  return (ev > 0 ? '+' : '') + ev.toFixed(1);
}

function updateParam(key, value, containerId) {
  const el = $('p-' + key);
  if (!el) return;
  if (el.textContent === value) return;
  el.textContent = value;
  const container = $(containerId);
  if (container) {
    container.classList.add('changed');
    setTimeout(() => container.classList.remove('changed'), 800);
  }
}

/* ====== Fast tier — luminance ====== */
function fastAnalyze() {
  if (!video.videoWidth) return null;
  const t0 = performance.now();
  try {
    fastCtx.drawImage(video, 0, 0, 16, 16);
    const d = fastCtx.getImageData(0, 0, 16, 16).data;
    let lum = 0;
    for (let i = 0; i < d.length; i += 4) {
      lum += 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
    }
    lum /= 256;
    lastFastMs = performance.now() - t0;
    return lum;
  } catch (e) { return null; }
}

/* ====== Slow tier — Gemini VLM ====== */
async function callGemini(base64Jpeg) {
  const prompt = `你是一位专业人像摄影指导，正在通过手机摄像头实时分析取景画面。基于这张图片，推荐最合适的姿势类型和 M 档相机参数。

严格返回一个 JSON 对象，字段如下：
{
  "scene": "用 2-6 个中文字描述场景，例如「户外逆光」「室内暖光」「夜间街拍」",
  "env_signals": ["环境关键词数组，2-4 个，例如「逆光」「窗光」「绿植背景」「高对比」"],
  "subject_signals": ["主体关键词数组，2-4 个。若画面中没有人，就描述主要物体。例如「站姿」「单人」「深色衣着」「微笑」；若无人：「无人物」「静物」"],
  "pose": "必须从这个列表中选一个: ${POSE_KEYS.join(', ')}",
  "iso": 一个整数，范围 50-6400，根据光线情况选择,
  "shutter": "快门速度字符串，格式如「1/60」「1/250」「1/1000」",
  "ev": 曝光补偿数值，范围 -2.0 到 +2.0,
  "wb": "白平衡色温字符串，格式如「5500K」「3200K」",
  "reasoning": "用一句中文（30 字以内）说明为什么这样选参数"
}

只返回 JSON，不要 markdown 代码块，不要额外说明。`;

  const body = {
    contents: [{
      parts: [
        { text: prompt },
        { inline_data: { mime_type: 'image/jpeg', data: base64Jpeg } }
      ]
    }],
    generationConfig: {
      temperature: 0.4,
      responseMimeType: 'application/json',
      responseSchema: {
        type: 'object',
        properties: {
          scene: { type: 'string' },
          env_signals: { type: 'array', items: { type: 'string' } },
          subject_signals: { type: 'array', items: { type: 'string' } },
          pose: { type: 'string', enum: POSE_KEYS },
          iso: { type: 'integer' },
          shutter: { type: 'string' },
          ev: { type: 'number' },
          wb: { type: 'string' },
          reasoning: { type: 'string' }
        },
        required: ['scene','env_signals','subject_signals','pose','iso','shutter','ev','wb','reasoning']
      }
    }
  };

  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), VLM_TIMEOUT_MS);

  try {
    const resp = await fetch(GEMINI_ENDPOINT + '?key=' + encodeURIComponent(apiKey), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
      signal: controller.signal
    });
    clearTimeout(timer);

    if (!resp.ok) {
      const errText = await resp.text().catch(() => '');
      throw new Error(`HTTP ${resp.status}: ${errText.slice(0, 200)}`);
    }
    const data = await resp.json();
    const text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!text) throw new Error('Empty response from Gemini');

    const parsed = JSON.parse(text);
    if (!POSES[parsed.pose]) {
      // Fallback if VLM picked an unknown pose
      parsed.pose = 'three_quarter';
    }
    return parsed;
  } catch (e) {
    clearTimeout(timer);
    throw e;
  }
}

async function slowAnalyze() {
  if (isThinking) return;
  if (Date.now() - lastVlmTime < VLM_MIN_INTERVAL_MS && vlmCallCount > 0) return;
  if (!video.videoWidth) return;
  if (!apiKey) return;

  isThinking = true;
  vlmCallCount++;
  lastVlmError = null;
  sceneLabel.classList.remove('error');
  sceneLabel.classList.add('thinking');
  sceneText.textContent = 'AI · THINKING…';
  updateHUD();

  const t0 = performance.now();

  try {
    // Draw video to VLM canvas (letterbox-fit to preserve aspect)
    const vw = video.videoWidth, vh = video.videoHeight;
    const scale = Math.min(VLM_INPUT_SIZE / vw, VLM_INPUT_SIZE / vh);
    const dw = vw * scale, dh = vh * scale;
    vlmCtx.fillStyle = '#000';
    vlmCtx.fillRect(0, 0, VLM_INPUT_SIZE, VLM_INPUT_SIZE);
    vlmCtx.drawImage(video, (VLM_INPUT_SIZE - dw) / 2, (VLM_INPUT_SIZE - dh) / 2, dw, dh);

    const dataUrl = vlmCanvas.toDataURL('image/jpeg', 0.8);
    const base64 = dataUrl.split(',')[1];

    const decision = await callGemini(base64);
    lastDecision = decision;
    lastVlmMs = performance.now() - t0;
    lastBrightness = fastAnalyze();
    lastVlmTime = Date.now();

    setPose(decision.pose, decision);

    setTimeout(() => {
      sceneLabel.classList.remove('thinking');
      if (decision.scene) sceneText.textContent = decision.scene.toUpperCase();
    }, 300);

  } catch (e) {
    console.error('VLM error:', e);
    lastVlmError = e.message || String(e);
    lastVlmMs = performance.now() - t0;
    sceneLabel.classList.remove('thinking');
    sceneLabel.classList.add('error');
    sceneText.textContent = 'VLM ERROR · TAP HUD';
    // Revert state after a moment
    setTimeout(() => {
      sceneLabel.classList.remove('error');
      if (lastDecision) sceneText.textContent = lastDecision.scene.toUpperCase();
      else sceneText.textContent = 'WAITING';
    }, 3000);
  } finally {
    isThinking = false;
    updateHUD();
  }
}

/* ====== Fast loop — triggers slow ====== */
function startAnalysisLoop() {
  const tick = () => {
    const lum = fastAnalyze();
    if (lum !== null) {
      const noVlmYet = vlmCallCount === 0;
      const significantChange = lastBrightness !== null &&
                                Math.abs(lum - lastBrightness) > VLM_BRIGHTNESS_DELTA;
      const stableNow = Date.now() - lastMotionTime > 400;

      if (noVlmYet || (significantChange && stableNow)) {
        slowAnalyze();
      }
    }
    updateHUD();
    fastLoopHandle = setTimeout(tick, fastIntervalMs);
  };
  tick();
}

/* ====== FPS / thermal ====== */
let frameCount = 0;
let lastFpsUpdate = performance.now();
let fpsHistory = [];

function rafLoop() {
  frameCount++;
  const now = performance.now();
  const elapsed = now - lastFpsUpdate;
  if (elapsed >= 1000) {
    currentFps = Math.round(frameCount * 1000 / elapsed);
    frameCount = 0;
    lastFpsUpdate = now;

    fpsHistory.push(currentFps);
    if (fpsHistory.length > 10) fpsHistory.shift();
    const avgFps = fpsHistory.reduce((a, b) => a + b, 0) / fpsHistory.length;
    const wasWarn = thermalWarn;
    thermalWarn = fpsHistory.length >= 5 && avgFps < THERMAL_FPS_THRESHOLD;
    if (thermalWarn && !wasWarn) fastIntervalMs = 400;
    else if (!thermalWarn && wasWarn) fastIntervalMs = 200;
    updateHUD();
  }
  requestAnimationFrame(rafLoop);
}

function updateHUD() {
  const fpsEl = $('hud-fps');
  fpsEl.textContent = currentFps || '—';
  fpsEl.className = 'hud-v' + (thermalWarn ? ' warn' : (currentFps >= 28 ? ' ready' : ''));
  $('hud-fast').textContent = lastFastMs ? lastFastMs.toFixed(1) + 'ms' : '—';
  const vlmEl = $('hud-vlm');
  vlmEl.textContent = lastVlmMs ? Math.round(lastVlmMs) + 'ms' : '—';
  vlmEl.className = 'hud-v' + (lastVlmError ? ' err' : '');
  $('hud-calls').textContent = vlmCallCount;
  const stateEl = $('hud-state');
  let stateText, stateClass = 'hud-v';
  if (lastVlmError) { stateText = 'ERR'; stateClass += ' err'; }
  else if (isThinking) { stateText = 'THINKING'; stateClass += ' thinking'; }
  else if (isAligned) { stateText = 'READY'; stateClass += ' ready'; }
  else if (lastDecision) { stateText = 'FRAMING'; }
  else { stateText = 'IDLE'; }
  stateEl.textContent = stateText;
  stateEl.className = stateClass;
}

/* ====== Camera start ====== */
async function startCamera() {
  apiKey = keyInput.value.trim();
  if (!validateKeyFormat(apiKey)) {
    startError.textContent = 'Key format invalid';
    return;
  }
  localStorage.setItem(STORAGE_KEY, apiKey);
  startError.textContent = '';
  startBtn.textContent = '启动中…';
  startBtn.disabled = true;

  // Motion permission (iOS 13+)
  if (typeof DeviceMotionEvent !== 'undefined' &&
      typeof DeviceMotionEvent.requestPermission === 'function') {
    try {
      const resp = await DeviceMotionEvent.requestPermission();
      if (resp === 'granted') motionAvailable = true;
    } catch (e) { }
  } else if (typeof DeviceMotionEvent !== 'undefined') {
    motionAvailable = true;
  }

  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width: { ideal: 1920 },
        height: { ideal: 1080 }
      },
      audio: false
    });
    video.srcObject = stream;
    await video.play();

    await new Promise(res => {
      if (video.videoWidth) res();
      else video.addEventListener('loadedmetadata', res, { once: true });
    });

    startEl.style.display = 'none';
    cameraView.classList.add('active');

    sceneLabel.classList.add('visible');
    // Seed with a default silhouette before first VLM returns
    svgPose.innerHTML = POSES.three_quarter.svg;
    currentPoseKey = 'three_quarter';

    requestAnimationFrame(rafLoop);
    startAnalysisLoop();

    if (motionAvailable) window.addEventListener('devicemotion', onDeviceMotion);
    stableCheckInterval = setInterval(checkStability, 250);

  } catch (err) {
    startBtn.textContent = '开始';
    startBtn.disabled = false;
    showError(err);
  }
}

/* ====== Motion / stability ====== */
let lastAcc = { x: 0, y: 0, z: 0 };
let accInit = false;
function onDeviceMotion(e) {
  const acc = e.accelerationIncludingGravity || e.acceleration || {};
  const x = acc.x || 0, y = acc.y || 0, z = acc.z || 0;
  if (!accInit) { lastAcc = { x, y, z }; accInit = true; return; }
  const delta = Math.abs(x - lastAcc.x) + Math.abs(y - lastAcc.y) + Math.abs(z - lastAcc.z);
  lastAcc = { x, y, z };
  if (delta > 0.35) lastMotionTime = Date.now();
}
function checkStability() {
  // Only consider "aligned" once we have a VLM decision
  const stableFor = Date.now() - lastMotionTime;
  const nowAligned = stableFor > ALIGNED_HOLD_MS && !!lastDecision && !isThinking;
  if (nowAligned !== isAligned) {
    isAligned = nowAligned;
    silhouette.classList.toggle('aligned', isAligned);
    alignHint.classList.toggle('visible', isAligned);
    shutterBtn.classList.toggle('ready', isAligned);
    updateHUD();
  }
}

function showError(err) {
  console.error(err);
  let msg = '';
  const isHttps = location.protocol === 'https:' || location.hostname === 'localhost';
  if (!isHttps) {
    msg = '相机需要 HTTPS 环境。请通过 GitHub Pages 或 Vercel 部署后访问。';
  } else if (err && err.name === 'NotAllowedError') {
    msg = '相机权限被拒绝。请在浏览器设置中允许访问。如果在 iframe 里打开，请直接在浏览器打开。';
  } else if (err && err.name === 'NotFoundError') {
    msg = '没有找到可用的相机。';
  } else {
    msg = (err && err.message) ? err.message : '未知错误';
  }
  errorMsg.textContent = msg;
  errorEl.classList.add('visible');
}

/* ====== Shutter ====== */
shutterBtn.addEventListener('click', capturePhoto);

async function capturePhoto() {
  if (!video.videoWidth) return;
  flashEl.classList.remove('flashing');
  void flashEl.offsetWidth;
  flashEl.classList.add('flashing');
  if (navigator.vibrate) navigator.vibrate(30);

  captureCanvas.width = video.videoWidth;
  captureCanvas.height = video.videoHeight;
  captureCtx.drawImage(video, 0, 0);
  const dataUrl = captureCanvas.toDataURL('image/jpeg', 0.93);

  setTimeout(() => {
    previewImg.src = dataUrl;
    previewEl.classList.add('visible');
  }, 200);
}

previewCloseBtn.addEventListener('click', () => previewEl.classList.remove('visible'));

/* ====== Long-press settings ====== */
let pressTimer = null;
function startPress(e) {
  e.preventDefault();
  settingsBtn.classList.add('pressing');
  pressTimer = setTimeout(() => {
    settingsBtn.classList.remove('pressing');
    proEl.classList.add('open');
    if (navigator.vibrate) navigator.vibrate(40);
    pressTimer = null;
  }, 500);
}
function endPress() {
  settingsBtn.classList.remove('pressing');
  if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
}
settingsBtn.addEventListener('pointerdown', startPress);
settingsBtn.addEventListener('pointerup', endPress);
settingsBtn.addEventListener('pointerleave', endPress);
settingsBtn.addEventListener('pointercancel', endPress);

proCloseBtn.addEventListener('click', () => proEl.classList.remove('open'));

let proTouchStart = null;
proEl.addEventListener('touchstart', (e) => { proTouchStart = e.touches[0].clientY; }, { passive: true });
proEl.addEventListener('touchmove', (e) => {
  if (proTouchStart === null) return;
  if (e.touches[0].clientY - proTouchStart > 80) {
    proEl.classList.remove('open');
    proTouchStart = null;
  }
}, { passive: true });
proEl.addEventListener('touchend', () => { proTouchStart = null; });

hudEl.addEventListener('click', () => {
  if (lastVlmError) {
    alert('上次 VLM 调用失败：\n\n' + lastVlmError + '\n\n常见原因：\n• API key 无效或配额用完\n• 网络问题\n• 请求被 Gemini 安全策略拦截');
  } else {
    hudEl.classList.toggle('hidden');
  }
});

/* Reset key */
$('reset-key').addEventListener('click', () => {
  if (confirm('清除已保存的 API key 并返回启动页？')) {
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
  }
});

startBtn.addEventListener('click', startCamera);

document.addEventListener('visibilitychange', () => {
  if (document.hidden && stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
    if (fastLoopHandle) clearTimeout(fastLoopHandle);
    if (stableCheckInterval) clearInterval(stableCheckInterval);
  }
});

document.addEventListener('gesturestart', (e) => e.preventDefault());
document.addEventListener('dblclick', (e) => e.preventDefault());

/* Register service worker for PWA offline support */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => { /* optional */ });
  });
}
</script>
